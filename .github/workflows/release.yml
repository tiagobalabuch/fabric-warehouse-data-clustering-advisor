name: Build and Release

on:
  push:
    tags:
      - "v*"   # Triggers on tags like v0.2.0, v1.0.0, etc.

permissions:
  contents: write        # Required to create releases, upload assets, and push branches
  pull-requests: write   # Required to create PRs for changelog updates

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for changelog generation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          append_body: true
          body: |

            ---

            ### Installation

            Download the `.whl` file below and install it in your Fabric Spark notebook:

            ```python
            %pip install /lakehouse/default/Files/fabric_warehouse_data_clustering_advisor-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
            ```

            Or install directly from the URL (if your environment has internet access):

            ```python
            %pip install https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/fabric_warehouse_data_clustering_advisor-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
            ```
          files: |
            dist/fabric_warehouse_data_clustering_advisor-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
            dist/fabric_warehouse_data_clustering_advisor-${{ steps.version.outputs.VERSION }}.tar.gz
          draft: false
          prerelease: false

      - name: Generate CHANGELOG.md
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
          echo "This file is automatically updated by the release workflow." >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          TAGS=$(git tag --sort=-version:refname | grep '^v')
          PREV=""
          for TAG in $TAGS; do
            echo "## [$TAG](https://github.com/${{ github.repository }}/releases/tag/$TAG)" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            if [ -n "$PREV" ]; then
              RANGE="$TAG..$PREV"
            else
              RANGE="$TAG"
            fi
            git log --pretty=format:"- %s" $RANGE >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            PREV=$TAG
          done

      - name: Commit CHANGELOG.md and create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="changelog/${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete remote branch if it exists from a previous run
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update CHANGELOG.md for ${{ github.ref_name }}" \
            --body "Automated changelog update for release ${{ github.ref_name }}." \
            --label "chore" \
            --base master \
            --head "$BRANCH"
