name: Build and Release

on:
  push:
    tags:
      - "v*"   # Triggers on tags like v0.2.0, v1.0.0, etc.

permissions:
  contents: write        # Required to create releases, upload assets, and push branches
  pull-requests: write   # Required to create PRs for changelog updates

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for changelog generation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          append_body: true
          body: |

            ---

            ### Installation

            Download the `.whl` file below and install it in your Fabric Spark notebook:

            ```python
            %pip install /lakehouse/default/Files/fabric_warehouse_advisor-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
            ```

            Or install directly from the URL (if your environment has internet access):

            ```python
            %pip install https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/fabric_warehouse_advisor-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
            ```
          files: |
            dist/fabric_warehouse_advisor-${{ steps.version.outputs.VERSION }}-py3-none-any.whl
            dist/fabric_warehouse_advisor-${{ steps.version.outputs.VERSION }}.tar.gz
          draft: false
          prerelease: false

      - name: Generate CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
          echo "This file is automatically updated by the release workflow." >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          REPO="${{ github.repository }}"
          TAGS_ARRAY=($(git tag --sort=-version:refname | grep '^v'))

          for i in "${!TAGS_ARRAY[@]}"; do
            TAG="${TAGS_ARRAY[$i]}"
            NEXT_TAG="${TAGS_ARRAY[$((i+1))]:-}"
            TAG_DATE=$(git tag -l "$TAG" --format='%(creatordate:short)')

            echo "## [$TAG](https://github.com/$REPO/releases/tag/$TAG) - $TAG_DATE" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            if [ -n "$NEXT_TAG" ]; then
              RANGE="$NEXT_TAG..$TAG"
            else
              RANGE="$TAG"
            fi

            # Temp files for each section
            FEATURES=$(mktemp)
            FIXES=$(mktemp)
            DOCS=$(mktemp)
            CHORE_FILE=$(mktemp)
            OTHER=$(mktemp)

            # Process first-parent commits (merge commits + direct pushes)
            while IFS= read -r LINE; do
              PR_NUM=$(echo "$LINE" | grep -oP 'Merge pull request #\K[0-9]+')

              if [ -n "$PR_NUM" ]; then
                PR_INFO=$(gh pr view "$PR_NUM" --repo "$REPO" --json title,labels 2>&1) || {
                  echo "::warning::Failed to fetch PR #$PR_NUM: $PR_INFO" >&2
                  PR_INFO='{}'
                }
                PR_TITLE=$(echo "$PR_INFO" | jq -r '.title // empty' 2>/dev/null)
                [ -z "$PR_TITLE" ] && PR_TITLE="$LINE"

                SECTION="other"
                for LABEL in $(echo "$PR_INFO" | jq -r '.labels[]?.name' 2>/dev/null); do
                  case "$LABEL" in
                    feature|enhancement) SECTION="features"; break ;;
                    bug|fix) SECTION="fixes"; break ;;
                    documentation) SECTION="docs"; break ;;
                    chore) SECTION="chore"; break ;;
                  esac
                done

                ENTRY="- $PR_TITLE ([#$PR_NUM](https://github.com/$REPO/pull/$PR_NUM))"
                case "$SECTION" in
                  features) echo "$ENTRY" >> "$FEATURES" ;;
                  fixes) echo "$ENTRY" >> "$FIXES" ;;
                  docs) echo "$ENTRY" >> "$DOCS" ;;
                  chore) echo "$ENTRY" >> "$CHORE_FILE" ;;
                  *) echo "$ENTRY" >> "$OTHER" ;;
                esac
              else
                # Skip "Merge branch ..." commits
                echo "$LINE" | grep -qP '^Merge branch' && continue
                echo "- $LINE" >> "$OTHER"
              fi
            done < <(git log --first-parent --pretty=format:"%s" $RANGE)

            # Write sections in order (only if non-empty)
            for PAIR in "Features:$FEATURES" "Bug Fixes:$FIXES" "Documentation:$DOCS" "Chore:$CHORE_FILE" "Other Changes:$OTHER"; do
              SECTION_NAME="${PAIR%%:*}"
              FILE="${PAIR#*:}"
              if [ -s "$FILE" ]; then
                echo "### $SECTION_NAME" >> CHANGELOG.md
                echo "" >> CHANGELOG.md
                cat "$FILE" >> CHANGELOG.md
                echo "" >> CHANGELOG.md
              fi
            done

            rm -f "$FEATURES" "$FIXES" "$DOCS" "$CHORE_FILE" "$OTHER"
          done

      - name: Commit CHANGELOG.md and create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="changelog/${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Switch to master so the branch doesn't include workflow file diffs
          # (GITHUB_TOKEN cannot push branches containing workflow changes)
          git stash -- CHANGELOG.md
          git checkout master
          git stash pop
          # Delete remote branch if it exists from a previous run
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update CHANGELOG.md for ${{ github.ref_name }}"
          git push --force origin "$BRANCH"
          gh pr create \
            --title "Update CHANGELOG.md for ${{ github.ref_name }}" \
            --body "Automated changelog update for release ${{ github.ref_name }}." \
            --label "chore" \
            --base master \
            --head "$BRANCH"
