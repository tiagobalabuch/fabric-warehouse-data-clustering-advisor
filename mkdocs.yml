site_name: Fabric Warehouse Data Clustering Advisor
site_description: A PySpark library that assesses and recommends Data Clustering for Microsoft Fabric Warehouse tables.
site_url: https://tiagobalabuch.github.io/fabric-warehouse-data-clustering-advisor/
repo_url: https://github.com/tiagobalabuch/fabric-warehouse-data-clustering-advisor
repo_name: tiagobalabuch/fabric-warehouse-data-clustering-advisor

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works: how-it-works.md
  - Configuration: configuration.md
  - Scoring: scoring.md
  - Reports: reports.md
  - Cross-Workspace: cross-workspace.md
  - Data Type Reference: data-type-reference.md
  - Troubleshooting: troubleshooting.md
